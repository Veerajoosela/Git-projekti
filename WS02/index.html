<!DOCTYPE html>
    <html lang="en">
        <head>
            <title>My First HTML Page</title>
            <link rel="stylesheet" href="style.css">
            <style>
                p {
                    color: green;
                    font-size: 18px;
                    line-height: 1.5;
                }
                body {
                    background-color: lightgray;
                    font-family: Arial, sans-serif;
                    padding: 20px;
                }
                h2 {
                    font-size: 1.5em;
                    color: darkblue;
                    text-align: left;
                }
                .content-box {
                    padding: 10px;
                    margin: 15px;
                    background-color: #f0f0f0;
                    border: 2px solid #ccc;
                }
                table {
                    width: 100%;
                    border-collapse: collapse;
                    margin: 20px 0;
                    font-family: Arial, sans-serif;
                }
                th, td {
                    background-color: #f2f2f2;
                    border: 2px solid #ddd;
                    padding: 8px;
                    text-align: left;
                }
                th {
                    background-color: #f2f2f2;
                    color: black;
                    text-align: left;
                }
                form {
                    display: flex;
                    flex-direction: column;
                    gap: 10px;
                }
                label {
                    font-weight: bold;
                }
                input[type="text"], input[type="email"] {
                    padding: 8px;
                    border: 2px solid #ddd;
                    border-radius: 5px;
                }
                input[type="submit"] {
                    background-color: #4CAF50;
                    color: white;
                    padding: 12px;
                    border: none;
                    border-radius: 5px;
                    cursor: pointer;
                }
                input[type="submit"]:hover {
                    background-color: #45a049;
                }
            </style>
        </head>
        <body>
            <h1 style="color: darkred; text-align: center">I'm Veera Joosela</h1>
            <p>Welcome to my page!</p>
            <p>I am a student at Laurea.</p>
            <img src="Kuva.JPG" alt="A photo of me" width="200">
            <h2>My hobbies</h2>
            <ul>
                <li>Pilates</li>
                <li>Video games</li>
                <li>Reading books</li>
            </ul>
            <div class="content-box">
                <h3>About me</h3>
                <p>My favorite hobby is pilates</p>
            </div>
            <a href="https://www.youtube.com/">Visit Youtube!</a>
            <table>
                <tr>
                    <th>Course Name</th>
                    <th>Status</th>
                </tr>
                <tr>
                    <td>Website development</td>
                    <td>Ongoing</td>
                </tr>
                <tr>
                    <td>Python Programming</td>
                    <td>Completed</td>
                </tr>
                <tr>
                    <td>Digital service development</td>
                    <td>Completed</td>
                </tr>
            </table>
            <form>
                <label for="name">Name:</label>
                <input type="text" id="name" name="name"><br><br>
                <label for="email">Email:</label>
                <input type="email" id="email" name="email"><br><br>
                <input type="submit" value="Submit">
            </form>
        </body>
    </html>
